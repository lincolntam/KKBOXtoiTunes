<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes Music Tag Helper</title>
    <style>
        :root {
            --primary-color: #00b7d3;
            --secondary-color: #28a745;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 { margin-top: 0; font-size: 24px; color: var(--primary-color); text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .result-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: none;
        }
        .field { margin-bottom: 15px; }
        .field span { font-weight: bold; color: #666; margin-right: 5px; }
        .lyrics-container {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .copy-btn {
            background-color: var(--secondary-color);
            margin-top: 20px;
        }
        .footer-note {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Music Tag Helper</h1>
    <div class="input-group">
        <label for="songUrl">KKBOX 歌曲網址</label>
        <input type="text" id="songUrl" placeholder="https://www.kkbox.com/tw/tc/song/...">
    </div>
    <button id="fetchBtn" onclick="fetchMusicData()">抓取資料</button>

    <div id="resultSection" class="result-section">
        <div class="field"><span>歌名:</span> <span id="resTitle"></span></div>
        <div class="field"><span>歌手:</span> <span id="resArtist"></span></div>
        <div class="field"><span>作曲:</span> <span id="resComposer"></span></div>
        <div class="field"><span>作詞:</span> <span id="resLyricist"></span></div>
        <label>歌詞:</label>
        <div id="resLyrics" class="lyrics-container"></div>
        
        <button class="copy-btn" onclick="copyToClipboard()">複製到剪貼簿 (iTunes 格式)</button>
    </div>
    
    <p class="footer-note">提示：請確保已正確配置 Cloudflare Worker 網址。</p>
</div>

<script>
    // --- 重要：請在此處填入你的 Cloudflare Worker 網址 ---
    const WORKER_URL = 'kkboxtoitunes.lincolntam56.workers.dev';

    async function fetchMusicData() {
        const url = document.getElementById('songUrl').value.trim();
        const btn = document.getElementById('fetchBtn');
        const resultSection = document.getElementById('resultSection');

        if (!url) {
            alert('請輸入有效網址');
            return;
        }

        btn.disabled = true;
        btn.innerText = '讀取中...';
        resultSection.style.display = 'none';

        try {
            const response = await fetch(`${WORKER_URL}?url=${encodeURIComponent(url)}`);
            if (!response.ok) throw new Error('網路回應不正確');
            
            const data = await response.json();
            
            document.getElementById('resTitle').innerText = data.title || 'N/A';
            document.getElementById('resArtist').innerText = data.artist || 'N/A';
            document.getElementById('resComposer').innerText = data.composer || 'N/A';
            document.getElementById('resLyricist').innerText = data.lyricist || 'N/A';
            document.getElementById('resLyrics').innerText = data.lyrics || 'N/A';
            
            resultSection.style.display = 'block';
        } catch (error) {
            console.error(error);
            alert('抓取失敗。請檢查 Worker 是否已啟動及網址是否正確。');
        } finally {
            btn.disabled = false;
            btn.innerText = '抓取資料';
        }
    }

    function copyToClipboard() {
        const title = document.getElementById('resTitle').innerText;
        const artist = document.getElementById('resArtist').innerText;
        const composer = document.getElementById('resComposer').innerText;
        const lyricist = document.getElementById('resLyricist').innerText;
        const lyrics = document.getElementById('resLyrics').innerText;

        const textToCopy = `歌名：${title}\n歌手：${artist}\n作曲：${composer}\n作詞：${lyricist}\n\n[歌詞]\n${lyrics}`;

        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('已成功複製到剪貼簿！');
        });
    }
</script>

</body>
</html>
