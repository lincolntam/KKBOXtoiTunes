<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTunes Music Tag Helper</title>
    <style>
        :root { --primary: #00b7d3; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; display: none; border-top: 1px solid #eee; padding-top: 20px; }
        .lyrics-box { background: #f9f9f9; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; max-height: 300px; overflow-y: auto; margin: 10px 0; border: 1px solid #eee; }
        .copy-btn { background: #28a745; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Tag Helper</h1>
        <input type="text" id="songUrl" placeholder="貼上 KKBOX 歌曲網址...">
        <button id="btn" onclick="fetchData()">抓取資料</button>

        <div id="result">
            <p><strong>歌名：</strong><span id="rTitle"></span></p>
            <p><strong>歌手：</strong><span id="rArtist"></span></p>
            <p><strong>作曲：</strong><span id="rComposer"></span></p>
            <p><strong>作詞：</strong><span id="rLyricist"></span></p>
            <div class="lyrics-box" id="rLyrics"></div>
            <button class="copy-btn" onclick="copyText()">複製完整資訊 (iTunes 格式)</button>
        </div>
    </div>

    <script>
        const API = 'https://kkboxtoitunes.lincolntam56.workers.dev/';

        async function fetchData() {
            const url = document.getElementById('songUrl').value;
            const btn = document.getElementById('btn');
            if(!url) return alert('請輸入網址');

            btn.innerText = '讀取中...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if(data.error) throw new Error(data.error);

                document.getElementById('rTitle').innerText = data.title;
                document.getElementById('rArtist').innerText = data.artist;
                document.getElementById('rComposer').innerText = data.composer;
                document.getElementById('rLyricist').innerText = data.lyricist;
                document.getElementById('rLyrics').innerText = data.lyrics;
                document.getElementById('result').style.display = 'block';
            } catch (e) {
                alert('抓取失敗，請檢查 Worker 是否已部署代碼');
            } finally {
                btn.innerText = '抓取資料';
                btn.disabled = false;
            }
        }

        function copyText() {
            const t = document.getElementById('rTitle').innerText;
            const a = document.getElementById('rArtist').innerText;
            const c = document.getElementById('rComposer').innerText;
            const l = document.getElementById('rLyricist').innerText;
            const ly = document.getElementById('rLyrics').innerText;
            const full = `歌名：${t}\n歌手：${a}\n作曲：${c}\n作詞：${l}\n\n[歌詞]\n${ly}`;
            navigator.clipboard.writeText(full);
            alert('已複製！');
        }
    </script>
</body>
</html>
